<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="32" height="32">
  <!-- Momiji Labs — Tile sub-mark (amber). Rounded square with knocked-out lowercase 'm'. -->
  <!-- Based on brand system: branding/brand-showcase/concepts-final.jsx -->
  <defs>
    <mask id="m-mask">
      <rect width="100" height="100" fill="white"/>
      <text
        x="50"
        y="76"
        font-family="'Space Grotesk', ui-sans-serif, system-ui, sans-serif"
        font-size="76"
        font-weight="600"
        fill="black"
        text-anchor="middle"
        letter-spacing="-3"
      >m</text>
    </mask>
  </defs>
  <!-- 22% corner radius per brand spec -->
  <rect width="100" height="100" rx="22" fill="#D97706" mask="url(#m-mask)"/>
</svg>
